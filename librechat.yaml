# Configuration version (required) — matches LibreChat v0.8.6 schema
version: 1.3.12

#############################################################################
# GODMODE — LibreChat Configuration
#
# Aligned to the official LibreChat configuration schema (config version
# 1.3.12, shipped with LibreChat v0.8.6).
# Docs: https://www.librechat.ai/docs/configuration/librechat_yaml
#
# Built-in endpoints (anthropic, openAI) take their credentials — and, for
# openAI, their model list — from environment variables, NOT from this file.
# The built-in endpoint schema does not accept `apiKey` for these endpoints,
# and only the anthropic endpoint accepts an inline `models` list.
#   ANTHROPIC_API_KEY, OPENAI_API_KEY  -> provider credentials
#   OPENAI_MODELS                      -> openAI model list (comma-separated)
#   APP_TITLE                          -> application title / branding
#############################################################################

cache: true

# ---------------------------------------------------------------------------
# Interface — feature toggles (app title is set via the APP_TITLE env var)
# ---------------------------------------------------------------------------
interface:
  modelSelect: true   # model picker in the chat header
  parameters: true    # per-conversation model parameter editing
  presets: true       # save / load conversation presets
  agents: true        # LibreChat Agents (tool use)
  memories: true      # native memory + Personalization UI
  webSearch: true     # web search control in the chat area
  fileSearch: true    # file upload + search control

# ---------------------------------------------------------------------------
# Native Memory (per-user personalization — first memory tier)
#
# Automatic memory extraction requires a memory `agent`. The Mem0 / OpenMemory
# MCP server below provides the second, cross-session semantic memory tier.
# ---------------------------------------------------------------------------
memory:
  personalize: true
  validKeys:
    - preferences
    - work_info
    - personal_info
    - skills
    - interests
    - context
  tokenLimit: 10000
  agent:
    provider: anthropic
    model: claude-3-5-haiku-20241022
    instructions: >-
      You manage durable user memory. Extract and store stable facts,
      preferences, and context worth remembering across sessions. Ignore
      transient or one-off details.
    model_parameters:
      temperature: 0.1

# ---------------------------------------------------------------------------
# MCP Servers
#
# `allowedAddresses` exempts these internal Docker services from LibreChat's
# default SSRF block for remote MCP transports (host:port form required).
# ---------------------------------------------------------------------------
mcpSettings:
  allowedAddresses:
    - openmemory-mcp:8765
    - vision-bridge:8000

mcpServers:
  # Mem0 / OpenMemory — persistent cross-session semantic/episodic memory
  openmemory:
    type: sse
    url: "http://openmemory-mcp:8765/mcp/librechat/sse/default"
    timeout: 30000
    initTimeout: 15000
    description: "Mem0 OpenMemory — persistent cross-session memory store"

  # Vision Bridge — live webcam frame analysis
  vision-bridge:
    type: sse
    url: "http://vision-bridge:8000/sse"
    timeout: 60000
    initTimeout: 15000
    description: "Analyze live webcam frames from the user's camera"

# ---------------------------------------------------------------------------
# Web Search
#
# Provider keys resolve from the environment. Set at least one search provider
# key AND one scraper key to activate web search; with no keys set the feature
# stays dormant. A reranker (Jina/Cohere) is optional.
#   Search:  SERPER_API_KEY (or Tavily / SearXNG)
#   Scrape:  FIRECRAWL_API_KEY (+ optional FIRECRAWL_API_URL) (or Tavily)
#   Rerank:  JINA_API_KEY (optional)
# ---------------------------------------------------------------------------
webSearch:
  serperApiKey: "${SERPER_API_KEY}"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  firecrawlApiUrl: "${FIRECRAWL_API_URL}"
  jinaApiKey: "${JINA_API_KEY}"

# ---------------------------------------------------------------------------
# Model Endpoints
#
# anthropic / openAI are built-in endpoints — only title/stream behavior is
# configurable here. Credentials (and the openAI model list) come from env.
# ---------------------------------------------------------------------------
endpoints:
  # -- Anthropic (primary: Claude Opus + Sonnet) ----------------------------
  # The anthropic endpoint schema accepts an inline `models` list.
  anthropic:
    models:
      - claude-opus-4-5
      - claude-sonnet-4-5
      - claude-3-5-sonnet-20241022
      - claude-3-5-haiku-20241022
      - claude-3-opus-20240229
      - claude-3-sonnet-20240229
    titleConvo: true
    titleModel: "claude-3-5-haiku-20241022"

  # -- OpenAI (fallback / vision) -------------------------------------------
  # Model list comes from OPENAI_MODELS; the openAI endpoint schema does not
  # accept an inline `models` list. API key comes from OPENAI_API_KEY.
  openAI:
    titleConvo: true
    titleModel: "gpt-4o-mini"

  # -- Agents (tool use: MCP, web search, code, file search) ----------------
  agents:
    disableBuilder: false
    capabilities:
      - tools          # enables MCP tools (openmemory, vision-bridge)
      - execute_code   # requires the LibreChat Code Interpreter API to run
      - file_search    # requires the RAG API (provided in the stack)
      - web_search     # requires the webSearch providers above

# ---------------------------------------------------------------------------
# File Uploads & Vision Inputs
#
# Vision is automatic for capable models (Claude 3+, GPT-4o). It is governed
# by the model's capabilities and the allowed MIME types below — there is no
# separate vision on/off flag in the endpoint schema.
# ---------------------------------------------------------------------------
fileConfig:
  endpoints:
    anthropic:
      fileLimit: 5
      fileSizeLimit: 20        # MB per file
      totalSizeLimit: 50       # MB per request
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
    openAI:
      fileLimit: 5
      fileSizeLimit: 20
      totalSizeLimit: 50
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
    agents:
      fileLimit: 10
      fileSizeLimit: 50
      totalSizeLimit: 200
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
  serverFileSizeLimit: 100     # MB global ceiling
  avatarSizeLimit: 2           # MB
