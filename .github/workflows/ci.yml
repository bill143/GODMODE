name: CI

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Validate docker-compose configuration
  # ---------------------------------------------------------------------------
  docker-compose-validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env for compose config validation
        run: |
          cat > .env <<'EOF'
          ANTHROPIC_API_KEY=sk-ant-placeholder
          OPENAI_API_KEY=sk-openai-placeholder
          MONGO_URI=mongodb://mongodb:27017/LibreChat
          MEILI_MASTER_KEY=placeholder_meili_key_for_ci_validation_only
          QDRANT_URL=http://qdrant:6333
          CREDS_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          CREDS_IV=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_SECRET=bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          JWT_REFRESH_SECRET=cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          MEM0_API_KEY=
          MEM0_COLLECTION_NAME=godmode_memory
          VISION_DEFAULT_PROVIDER=anthropic
          VISION_DEFAULT_MODEL=claude-3-5-sonnet-20241022
          VISION_MAX_FRAMES=4
          ALLOW_REGISTRATION=true
          ALLOW_SOCIAL_LOGIN=false
          MEMORY_ENABLED=true
          EOF

      - name: Validate docker compose config
        run: docker compose config --quiet

  # ---------------------------------------------------------------------------
  # Runtime smoke test: build + boot the stack and verify it reaches a healthy
  # state. Lifecycle is managed by hoverkraft-tech/compose-action (up + wait +
  # automatic teardown); assertions reuse scripts/verify-stack.sh; failures emit
  # grouped per-service logs.
  #
  # Uses PLACEHOLDER secrets only — it never calls Anthropic/OpenAI, so it
  # cannot depend on external provider responses, keys, or rate limits. It
  # proves the local service graph boots and health endpoints answer; it does
  # NOT prove real model responses (that needs real keys; see docs/verification.md).
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Runtime Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder .env (no real secrets)
        run: |
          cat > .env <<'EOF'
          NODE_ENV=production
          LIBRECHAT_VERSION=v0.8.6
          PUBLIC_URL=http://localhost:3080
          GODMODE_DOMAIN=localhost
          TLS_EMAIL=admin@example.com
          CREDS_KEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          CREDS_IV=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_SECRET=bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          JWT_REFRESH_SECRET=cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          ANTHROPIC_API_KEY=sk-ant-placeholder-not-real
          OPENAI_API_KEY=sk-placeholder-not-real
          MONGO_URI=mongodb://mongodb:27017/LibreChat
          MEILI_MASTER_KEY=placeholder_meili_master_key_for_ci_only_0000000000000000
          SEARCH=true
          QDRANT_URL=http://qdrant:6333
          QDRANT_API_KEY=
          RAG_PORT=8000
          EMBEDDINGS_PROVIDER=openai
          EMBEDDINGS_MODEL=text-embedding-3-small
          MEM0_API_KEY=
          MEM0_COLLECTION_NAME=godmode_memory
          VISION_DEFAULT_PROVIDER=anthropic
          VISION_DEFAULT_MODEL=claude-3-5-sonnet-20241022
          VISION_MAX_FRAMES=4
          ALLOW_REGISTRATION=true
          ALLOW_SOCIAL_LOGIN=false
          MEMORY_ENABLED=true
          EOF

      # Compose-native lifecycle via hoverkraft-tech/compose-action: it runs
      # `docker compose up --detach` (building the local vision-bridge image)
      # and `--wait` BLOCKS until every service's healthcheck passes, so
      # readiness is driven by the repo's existing healthchecks. The action's
      # post hook automatically runs `docker compose down`, even on failure.
      - name: Build + start stack, wait for healthchecks
        uses: hoverkraft-tech/compose-action@v3.0.0
        with:
          compose-file: docker-compose.yml
          up-flags: "--build --wait --wait-timeout 300"
          down-flags: "--volumes --remove-orphans"

      # Reuse the operator verification script for the actual smoke assertions:
      # per-service health status + internal HTTP/TCP endpoint probes (librechat,
      # mongodb, meilisearch, qdrant, rag_api, openmemory-mcp, vision-bridge),
      # with a readable PASS/FAIL summary. Runs against the already-running stack
      # (no --up) and exits non-zero on any failure.
      - name: Smoke-verify health + endpoints
        run: bash scripts/verify-stack.sh --timeout 120

      # Actionable diagnostics: name each service's health state and emit its
      # logs as a collapsible group so reviewers see exactly what failed.
      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "::group::docker compose ps"
          docker compose ps || true
          echo "::endgroup::"
          for s in librechat mongodb meilisearch qdrant rag_api openmemory-mcp vision-bridge; do
            cid="$(docker compose ps -q "$s" 2>/dev/null)"
            state="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$cid" 2>/dev/null || echo absent)"
            echo "::group::$s [${state:-absent}] - last 200 log lines"
            docker compose logs --no-color --tail=200 "$s" 2>/dev/null || echo "(no container)"
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------------------
  # Lint Python (vision-bridge)
  # ---------------------------------------------------------------------------
  lint-python:
    name: Lint Python (vision-bridge)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check services/vision-bridge/

      - name: Ruff format check
        run: ruff format --check services/vision-bridge/

  # ---------------------------------------------------------------------------
  # Lint JavaScript / TypeScript (Next.js app)
  # ---------------------------------------------------------------------------
  lint-js:
    name: Lint JS/TS
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Validate librechat.yaml structure
  # ---------------------------------------------------------------------------
  validate-librechat-yaml:
    name: Validate librechat.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate YAML syntax
        run: python -c "import yaml, sys; yaml.safe_load(open('librechat.yaml')); print('librechat.yaml is valid YAML')"

  # ---------------------------------------------------------------------------
  # Security: check for hardcoded secrets
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded API keys
        run: |
          # Fail if real-looking API key patterns are present in tracked files
          if git grep -E 'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{90,}' -- ':!.env.example' ':!*.md'; then
            echo "ERROR: Possible hardcoded Anthropic API key found"
            exit 1
          fi
          if git grep -E 'sk-(proj-)?[A-Za-z0-9]{48,}' -- ':!.env.example' ':!*.md'; then
            echo "ERROR: Possible hardcoded OpenAI API key found"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  # ---------------------------------------------------------------------------
  # Build and publish vision-bridge image to GHCR on main
  # ---------------------------------------------------------------------------
  publish-vision-bridge:
    name: Publish vision-bridge image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vision-bridge
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./services/vision-bridge
          file: ./services/vision-bridge/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
