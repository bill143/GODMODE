###############################################################################
# GODMODE — Production Docker Compose Stack
# Built on LibreChat v0.8.6 (pin via LIBRECHAT_VERSION in .env)
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # LibreChat — primary chat API + client (port 3080)
  # ---------------------------------------------------------------------------
  librechat:
    image: ghcr.io/danny-avila/librechat:${LIBRECHAT_VERSION:-v0.8.6}
    container_name: godmode-librechat
    restart: unless-stopped
    ports:
      - "3080:3080"
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      rag_api:
        condition: service_healthy
      openmemory-mcp:
        condition: service_healthy
      vision-bridge:
        condition: service_healthy
    environment:
      HOST: "0.0.0.0"
      PORT: "3080"
      MONGO_URI: "mongodb://mongodb:27017/LibreChat"
      MEILI_HOST: "http://meilisearch:7700"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"
      RAG_PORT: "${RAG_PORT:-8000}"
      RAG_API_URL: "http://rag_api:${RAG_PORT:-8000}"
      CREDS_KEY: "${CREDS_KEY}"
      CREDS_IV: "${CREDS_IV}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      # Allow registration (set to false to lock down after initial setup)
      ALLOW_REGISTRATION: "${ALLOW_REGISTRATION:-true}"
      ALLOW_SOCIAL_LOGIN: "${ALLOW_SOCIAL_LOGIN:-false}"
      # Conversation search via Meilisearch
      SEARCH: "true"
      # Enable memory
      MEMORY_ENABLED: "${MEMORY_ENABLED:-true}"
    env_file:
      - .env
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - librechat_uploads:/app/client/public/images
      - librechat_logs:/app/api/logs
    networks:
      - godmode_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # MongoDB — conversation history and user data
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7-jammy
    container_name: godmode-mongodb
    restart: unless-stopped
    # Bind data port to loopback only — not exposed outside Docker network
    volumes:
      - mongo_data:/data/db
    networks:
      - godmode_net
    command: mongod --noauth
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Meilisearch — full-text conversation search
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.12.3
    container_name: godmode-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: "production"
    volumes:
      - meili_data:/meili_data
    networks:
      - godmode_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Qdrant — vector store for RAG and memory
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: godmode-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - godmode_net
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # LibreChat RAG API — document retrieval via Qdrant
  # ---------------------------------------------------------------------------
  rag_api:
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
    container_name: godmode-rag-api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      VECTOR_DB_TYPE: "atlas-mongo"
      ATLAS_MONGO_DB_URI: "mongodb://mongodb:27017/LibreChat"
      RAG_PORT: "${RAG_PORT:-8000}"
      EMBEDDINGS_PROVIDER: "${EMBEDDINGS_PROVIDER:-openai}"
      EMBEDDINGS_MODEL: "${EMBEDDINGS_MODEL:-text-embedding-3-small}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      JWT_SECRET: "${JWT_SECRET}"
    env_file:
      - .env
    networks:
      - godmode_net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ---------------------------------------------------------------------------
  # Mem0 / OpenMemory MCP Server — cross-session semantic memory via Qdrant
  # ---------------------------------------------------------------------------
  openmemory-mcp:
    image: mem0/openmemory-mcp:latest
    container_name: godmode-openmemory
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      MEM0_API_KEY: "${MEM0_API_KEY:-}"
      QDRANT_URL: "http://qdrant:6333"
      MEM0_VECTOR_STORE_PROVIDER: "qdrant"
      MEM0_VECTOR_STORE_URL: "http://qdrant:6333"
      MEM0_COLLECTION_NAME: "${MEM0_COLLECTION_NAME:-godmode_memory}"
      # MCP SSE server port
      MCP_SERVER_PORT: "8765"
    env_file:
      - .env
    networks:
      - godmode_net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/openapi.json', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ---------------------------------------------------------------------------
  # Vision Bridge — FastAPI webcam-frame relay service (MCP tool surface)
  # ---------------------------------------------------------------------------
  vision-bridge:
    build:
      context: ./services/vision-bridge
      dockerfile: Dockerfile
    container_name: godmode-vision-bridge
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      VISION_DEFAULT_PROVIDER: "${VISION_DEFAULT_PROVIDER:-anthropic}"
      VISION_DEFAULT_MODEL: "${VISION_DEFAULT_MODEL:-claude-3-5-sonnet-20241022}"
      VISION_MAX_FRAMES: "${VISION_MAX_FRAMES:-4}"
      ALLOWED_ORIGINS: "http://localhost:3080,${PUBLIC_URL:-http://localhost:3080}"
      MCP_SERVER_PORT: "8000"
    env_file:
      - .env
    networks:
      - godmode_net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  godmode_net:
    driver: bridge

volumes:
  mongo_data:
  meili_data:
  qdrant_data:
  librechat_uploads:
  librechat_logs:
