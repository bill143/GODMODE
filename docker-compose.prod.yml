services:
  librechat:
    # Not published on the host - only Caddy (below) is public. LibreChat is
    # reachable solely over the internal Docker network.
    # `!reset []` CLEARS the host port the base file binds (compose otherwise
    # CONCATENATES port lists, so a plain `[]` would not remove it). Requires
    # Docker Compose v2.24+. The base file binds 127.0.0.1 only, so even without
    # this, LibreChat is never exposed beyond loopback.
    ports: !reset []
    expose:
      - "3080"
    environment:
      # Production-safe registration default: CLOSED unless the operator opts
      # in via ALLOW_REGISTRATION=true in .env. (The base stack defaults to
      # OPEN for an easy local first run; this overlay flips that for prod.)
      ALLOW_REGISTRATION: "${ALLOW_REGISTRATION:-false}"
      # Public HTTPS URLs LibreChat uses for CORS + Secure auth cookies + links.
      # Derived from the domain you set in .env; must be the real https origin.
      DOMAIN_CLIENT: "https://${GODMODE_DOMAIN}"
      DOMAIN_SERVER: "https://${GODMODE_DOMAIN}"
      # Trust exactly one reverse-proxy hop (Caddy) so per-IP rate limiting and
      # ban tracking use the real client IP. Increase only if behind more proxies.
      TRUST_PROXY: "${TRUST_PROXY:-1}"
      # Keep the app out of search indexes.
      NO_INDEX: "true"
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.50

  mongodb:
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00

  meilisearch:
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00

  qdrant:
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00

  rag_api:
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00

  openmemory-mcp:
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.50

  vision-bridge:
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.50

  caddy:
    image: caddy:2.9-alpine
    container_name: godmode-caddy
    depends_on:
      librechat:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      GODMODE_DOMAIN: ${GODMODE_DOMAIN:-localhost}
      TLS_EMAIL: ${TLS_EMAIL:-admin@example.com}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - godmode_net
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50

volumes:
  caddy_data:
  caddy_config:
