services:
  librechat:
    ports: []
    expose:
      - "3080"
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.50

  mongodb:
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00

  meilisearch:
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00

  qdrant:
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00

  rag_api:
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00

  openmemory-mcp:
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.50

  vision-bridge:
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.50

  caddy:
    image: caddy:2.9-alpine
    container_name: godmode-caddy
    depends_on:
      librechat:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      GODMODE_DOMAIN: ${GODMODE_DOMAIN:-localhost}
      TLS_EMAIL: ${TLS_EMAIL:-admin@example.com}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - godmode_net
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50

volumes:
  caddy_data:
  caddy_config:
