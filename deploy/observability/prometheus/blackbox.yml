# GODMODE — blackbox-exporter modules
#
# Minimal probe definitions used by Prometheus' blackbox-* jobs.

modules:
  # HTTP probe — succeeds on any 2xx response.
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [] # empty = default 2xx range
      preferred_ip_protocol: ip4
      fail_if_not_ssl: false

  # Plain TCP connect probe — used for datastores with no HTTP health surface.
  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4
