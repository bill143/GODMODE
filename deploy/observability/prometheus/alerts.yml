# GODMODE — Prometheus alert rules
#
# These rules surface in the Prometheus UI (Alerts tab) and in Grafana.
# NOTE: notification routing (Alertmanager / email / Slack) is intentionally
# NOT included — wiring an Alertmanager is an operator-owned decision. Without
# it, alerts are visible but do not page anyone.

groups:
  - name: godmode-availability
    rules:
      - alert: ServiceProbeDown
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Health probe failing: {{ $labels.instance }}"
          description: "Black-box probe for {{ $labels.instance }} has failed for more than 2 minutes."

      - alert: ScrapeTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target down: {{ $labels.job }} ({{ $labels.instance }})"
          description: "Prometheus has not been able to scrape {{ $labels.instance }} for more than 2 minutes."

  - name: godmode-resources
    rules:
      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory above 90%"
          description: "Host memory usage has exceeded 90% for more than 5 minutes."

      - alert: HostLowDisk
        expr: (node_filesystem_avail_bytes{mountpoint="/host"} / node_filesystem_size_bytes{mountpoint="/host"}) < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host root filesystem below 10% free"
          description: "Less than 10% disk space remains on the host root filesystem."
