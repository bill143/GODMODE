# GODMODE — Grafana dashboard provider (loads JSON from disk)
apiVersion: 1

providers:
  - name: GODMODE
    orgId: 1
    folder: GODMODE
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
